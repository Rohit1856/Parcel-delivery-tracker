<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parcel Delivery Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>📦 Parcel Delivery Tracker</h1>

  <div class="input-section">
    <input type="text" id="parcelId" placeholder="Parcel ID">
    <input type="text" id="senderName" placeholder="Sender Name">
    <input type="text" id="destination" placeholder="Destination (e.g., Z)">
    <button onclick="addParcel()">Add Parcel</button>
    <button onclick="dispatchParcel()">Dispatch Parcel</button>
  </div>

  <h2>📋 Delivery Queue</h2>
  <ul id="queueList"></ul>

  <h2>🗺 Shortest Path from A</h2>
  <div class="input-section">
    <input type="text" id="cityTarget" placeholder="Destination City">
    <button onclick="showShortestPath()">Find Route</button>
    <p id="shortestPathResult"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
